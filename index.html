<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investor Reports Library</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f9 100%);
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: min(900px, 100%);
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 10px 32px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1f3a8a 0%, #1e1b4b 100%);
      color: #fff;
      padding: 28px 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      opacity: 0.9;
      line-height: 1.5;
    }

    .content {
      padding: 26px 32px 30px;
    }

    .content h2 {
      font-size: 14px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #1f3a8a;
      margin-bottom: 12px;
    }

    .report-list {
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .report-link {
      display: block;
      text-decoration: none;
      border: 1px solid #dbe2ef;
      border-radius: 10px;
      padding: 16px 18px;
      background: #fafcff;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
      color: inherit;
    }

    .report-link:hover,
    .report-link:focus-visible {
      transform: translateY(-1px);
      border-color: #1f3a8a;
      box-shadow: 0 8px 20px rgba(31, 58, 138, 0.15);
      outline: none;
    }

    .report-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 5px;
    }

    .report-meta {
      font-size: 13px;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Investor Reports</h1>
      <p>Select a report below to open the detailed investor summary.</p>
    </header>

    <section class="content">
      <h2>Available Reports</h2>
      <ul class="report-list">
        <li>
          <a class="report-link" href="reports/amplifon-2025.html">
            <div class="report-title">Amplifon S.p.A. — FY 2025 Investor Report</div>
            <div class="report-meta">1 report available · Click to open full analysis</div>
          </a>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
